version: '3.8'

services:
  # 🛰️ AGENT (Simula uma VPS Remota na porta 3001)
  perfomantia-agent:
    image: srvini/perfomantia:0.0.8
    container_name: perf_agent
    restart: unless-stopped
    ports:
      - "3001:3000" # Exposto na 3001 da sua máquina
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/host:ro
    environment:
      - AGENT_API_KEY=agent-secret-key-123
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - HOST_ETC=/host/etc
